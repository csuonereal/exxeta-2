services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: always

  middleware:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_SRD_MODEL=llama3.2
      - OLLAMA_JUDGE_MODEL=llama3.2
      - OLLAMA_ROUTING_MODEL=llama3.2
      # SQLite on a writable dir (avoid bind-mounting a single file: missing host path → dir → sqlite fails)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DATABASE_URL=sqlite:////app/data/compliance_middleware.db
    volumes:
      - middleware_data:/app/data
    depends_on:
      - ollama

volumes:
  ollama_data:
  middleware_data: