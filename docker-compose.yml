version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: always

  middleware:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_SRD_MODEL=llama3.2
      - OLLAMA_JUDGE_MODEL=llama3.2
      - OLLAMA_ROUTING_MODEL=llama3.2
    volumes:
      - ./compliance_middleware.db:/app/compliance_middleware.db
    depends_on:
      - ollama

volumes:
  ollama_data: