<body style="font-family: system-ui; max-width: 40rem; margin: 3rem auto; padding: 0 1rem;">
  <h1>Sovereign AI Router</h1>
  <p>The React UI runs as a separate dev server. From the project root:</p>
  <pre style="background: #f4f4f5; padding: 1rem;">cd frontend && npm install && npm run dev</pre>
  <p>Then open <strong>http://localhost:5173</strong> (default). Other port: <code>npm run dev -- --port 3000</code> or <code>FRONTEND_PORT=3000 npm run dev</code>.</p>
  <p>API base: <code>/api/sessions/</code></p>
</body>
